<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Result Page</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background: black;
            color: white;
            padding-top: 150px;
        }

        h1 {
            font-size: 40px;
        }
    </style>
</head>

<body>

<h1 id="output">Loading...</h1>

<script>
function getNameFromURL() {
    let params = new URLSearchParams(window.location.search);
    let name = params.get("name");

    if (!name || name.trim() === "") {
        return "FRIEND";
    }

    return name;
}

let name = getNameFromURL();

document.getElementById("output").innerText =
"GOOD NIGHT FROM " + name.toUpperCase();
</script>

</body>
</html>
